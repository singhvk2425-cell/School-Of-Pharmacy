<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Admin Panel | Al-Karim University</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1b5e20; --secondary: #ffd600; --dark: #222; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f0f2f5; }
        
        /* Navigation */
        nav { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--secondary); }
        .admin-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }

        /* Sections */
        .page { display: none; }
        .active { display: block; }

        /* Form & Cards */
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* Admin Table Style */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        tr:hover { background: #f9f9f9; }
        
        .loader { text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

<nav>
    <strong>SOP - AL-KARIM UNIVERSITY</strong>
    <button class="admin-btn" onclick="showAdmin()">Admin Login</button>
</nav>

<div class="container">
    
    <div id="studentPage" class="page active">
        <div class="card">
            <h2 style="color:var(--primary); text-align:center;">Admission Enquiry 2026</h2>
            <form id="enquiryForm">
                <input type="text" name="Name" placeholder="Student Name" required>
                <input type="tel" name="Phone" placeholder="Mobile Number" required>
                <select name="Course" required>
                    <option value="">-- Select Course --</option>
                    <option value="B.Pharm">B. Pharmacy</option>
                    <option value="D.Pharm">D. Pharmacy</option>
                </select>
                <input type="text" name="Qualification" placeholder="Highest Qualification" required>
                <button type="submit" class="btn-main" id="submitBtn">Submit Details</button>
            </form>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="admin-header">
            <h2 style="color:var(--primary);">Interested Students List</h2>
            <button onclick="window.location.reload()" class="admin-btn" style="color:black; border-color:black;">Logout</button>
        </div>
        
        <div class="card">
            <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Loading Data...</div>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>Course</th>
                            <th>Qualification</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    // Paste your Google Web App URL here
    const scriptURL = 'YAHAN_APNA_URL_DALEIN'; 

    // Handle Form Submission
    const form = document.getElementById('enquiryForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('submitBtn').innerText = "Sending...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(res => {
            alert("Success! Details submitted.");
            form.reset();
            document.getElementById('submitBtn').innerText = "Submit Details";
        })
        .catch(err => alert("Error submitting data."));
    });

    // Admin Login and List Display
    function showAdmin() {
        let pass = prompt("Enter Admin Password:");
        if (pass === "vksingh123") {
            document.getElementById('studentPage').classList.remove('active');
            document.getElementById('adminPage').classList.add('active');
            fetchData();
        } else {
            alert("Wrong Password!");
        }
    }

    // Fetch List from Google Sheet
    function fetchData() {
        document.getElementById('loader').style.display = "block";
        fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            let html = "";
            // Skipping headers (row 0)
            for(let i=1; i<data.length; i++) {
                html += `<tr>
                    <td>${data[i][0]}</td>
                    <td>${data[i][1]}</td>
                    <td>${data[i][2]}</td>
                    <td>${data[i][3]}</td>
                    <td>${new Date(data[i][4]).toLocaleDateString()}</td>
                </tr>`;
            }
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('loader').style.display = "none";
        });
    }
</script>

</body>
</html>

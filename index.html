<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP | Al-Karim University</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #1b5e20; --secondary: #ffd600; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #f0f4f0; color: #333; }
        nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--secondary); }
        .admin-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .live-tracker { background: var(--dark); color: var(--secondary); padding: 10px; text-align: center; font-weight: 600; border-radius: 8px; margin-bottom: 20px; font-family: monospace; font-size: 1rem; }
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 12px; border-bottom: 6px solid var(--secondary); margin-bottom: 25px; }
        .btn-apply { background: #d32f2f; color: white; padding: 18px; width: 100%; border: none; border-radius: 8px; font-weight: 700; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .page { display: none; }
        .active { display: block; }
        .admin-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .admin-header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .table-wrap { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins'; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        footer { background: var(--dark); color: #777; text-align: center; padding: 30px; margin-top: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 700;">AL-KARIM UNIVERSITY</div>
    <button class="admin-btn" onclick="adminLogin()">Admin Login</button>
</nav>

<div class="container">
    <div id="studentTracker" class="live-tracker">
        <span id="liveDate"></span> | <span id="liveTime"></span>
    </div>

    <div id="studentPage" class="page active">
        <header>
            <h1>SCHOOL OF PHARMACY</h1>
            <p>Admission Enquiry Portal 2026-27</p>
        </header>
        <button class="btn-apply" onclick="document.getElementById('modal').style.display='block'">
            <i class="fas fa-file-signature"></i> CLICK HERE TO APPLY
        </button>
    </div>

    <div id="adminPage" class="page">
        <div class="admin-card">
            <div class="admin-header">
                <h2 style="margin:0;">SCHOOL OF PHARMACY</h2>
                <p style="margin:5px 0 0; color:var(--secondary); font-size:0.8rem;">INTERESTED STUDENTS DETAILS</p>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th><th>Phone</th><th>Course</th><th>Qualification</th><th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" style="text-align:center; padding:30px;">Loading Records...</td></tr>
                    </tbody>
                </table>
            </div>
            <div style="text-align:center; padding:20px;"><button onclick="window.location.reload()">Logout</button></div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="document.getElementById('modal').style.display='none'" style="position:absolute; right:20px; top:15px; cursor:pointer;">&times;</span>
        <h3 style="text-align:center; color:var(--primary); margin-top:0;">Admission Form</h3>
        <form id="admissionForm">
            <input type="text" name="Name" placeholder="Full Name" required>
            <input type="tel" name="Phone" placeholder="Mobile Number" required>
            <select name="courses" required>
                <option value="">-- Select Course --</option>
                <option value="B.Pharmacy">B. Pharmacy</option>
                <option value="D.Pharmacy">D. Pharmacy</option>
            </select>
            <input type="text" name="Qualification" placeholder="Qualification" required>
            <input type="hidden" name="Date" id="hiddenDate">
            <button type="submit" class="btn-submit" id="sbtn">SUBMIT DETAILS</button>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2026 AL-KARIM UNIVERSITY | SCHOOL OF PHARMACY</p>
</footer>

<script>
    const apiURL = 'https://sheetdb.io/api/v1/umxo1j9q6u77s';

    // Live Date/Time
    function updateClock() {
        const now = new Date();
        document.getElementById('liveDate').innerText = now.toLocaleDateString('en-IN', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
        document.getElementById('liveTime').innerText = now.toLocaleTimeString('en-IN');
    }
    setInterval(updateClock, 1000); updateClock();

    // Form Submit
    document.getElementById('admissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('sbtn').innerText = "Sending...";
        document.getElementById('hiddenDate').value = new Date().toLocaleString('en-IN');

        fetch(apiURL, { method: 'POST', body: new FormData(this) })
        .then(() => { alert("Success! Details Saved."); window.location.reload(); });
    });

    // Admin Login
    function adminLogin() {
        if (prompt("Admin Password:") === "vksingh123") {
            document.getElementById('studentPage').style.display = 'none';
            document.getElementById('adminPage').style.display = 'block';
            loadData();
        } else { alert("Wrong Password!"); }
    }

    // Load Data - Flexible Logic to avoid 'undefined'
    function loadData() {
        fetch(apiURL).then(res => res.json()).then(data => {
            let html = "";
            data.forEach(row => {
                // Yeh logic Name, name, NAME teeno ko handle karega
                let n = row.Name || row.name || row.NAME || 'N/A';
                let p = row.Phone || row.phone || row.PHONE || 'N/A';
                let c = row.courses || row.Courses || row.course || 'N/A';
                let q = row.Qualification || row.qualification || 'N/A';
                let d = row.Date || row.date || 'N/A';

                html += `<tr>
                    <td><strong>${n}</strong></td>
                    <td>${p}</td>
                    <td>${c}</td>
                    <td>${q}</td>
                    <td>${d}</td>
                </tr>`;
            });
            document.getElementById('tableBody').innerHTML = html;
        });
    }
</script>
</body>
</html>
